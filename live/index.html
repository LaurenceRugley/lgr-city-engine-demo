  <title>LGR WebGL Lab — 17 · Viewer Controls</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0e0b07; overflow: hidden; }
    canvas { display: block; }       /* three.js appends the canvas here */
    .hint {
      position: fixed; left: 16px; bottom: 14px; z-index: 1;
      font: 11px/1.5 ui-monospace, monospace; letter-spacing: 0.08em;
      color: rgba(184, 153, 104, 0.75); text-transform: uppercase;
      pointer-events: none;
    }
    /* L41 BRANDED LOADER — painted from the page shell IMMEDIATELY (before the ~500 kB JS bundle even
       loads), so slow/mobile visitors see an on-brand mark instead of a blank dark canvas. createEngine
       adds .gone on the first rendered frame. prefers-reduced-motion → no spin (static mark). */
    #lgr-loader { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; background: #0e0b07;
      color: rgba(184,153,104,0.85); font: 600 12px/1 ui-monospace, monospace; letter-spacing: 0.22em;
      transition: opacity .5s ease; }
    #lgr-loader.gone { opacity: 0; pointer-events: none; }
    #lgr-loader .mark { font: 700 36px/1 Georgia, serif; letter-spacing: 0.08em; color: #b89968; }
    #lgr-loader .spin { width: 26px; height: 26px; border: 2px solid rgba(184,153,104,0.22);
      border-top-color: #b89968; border-radius: 50%; animation: lgrspin .9s linear infinite; }
    @keyframes lgrspin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { #lgr-loader .spin { animation: none; border-top-color: rgba(184,153,104,0.22); } }
  </style>
